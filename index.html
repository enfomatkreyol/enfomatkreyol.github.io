  <main>
    <section class="home">
      <section class="home" id="home">
        <div class="image mobile">
            <img src="/images/EK V-1.png" alt="">
        </div>
        <div class="content">
            <h3>Aplikasyon mobil <span><br> Enfomat kreyòl</span></h3>
            <p>
               Telechaje aplikasyon an pou ka swiv tout kou nou yo gratis, 
               sou aplikasyon sa wap jwen tout kou yo pa modil, wap gen posibilite 
               pou antre nan chanèl Telegram fòmasyon yo
            </p>
            <div class="bar-btn"><button class="btn" onclick="openForm()">Telechaje li kounye a</button></div>
        </div>
    
        <div class="image desktop">
            <img src="images/phone.png" alt="">
            
        </div>
    </section>
    </section>

    <section class="formulaire" id="myForm">
      <div>
        <button onclick="closeForm()">Fèmen</button>
          <form autocomplete="off" method="post" name="google-sheet">
              <div class="image">
                  <img src="/images/EK V-1.png" alt="">
              </div>
              <h1><span>Enfomat</span> kreyòl</h1>
              <div class="input name">
                  <input type="name" name="Name" placeholder="Entre Nom ou" required>
              </div>
              <div class="input phone">
                  <input type="number" name="Phone" placeholder="Entre Nimewo ou" required>
              </div>
              <div class="input ref">
                  <select name="Ref" id="ref">
                      <option value="W">Whatsapp</option>
                      <option value="F">Facebook</option>
                      <option value="T">Tioctok</option>
                  </select>
              </div>
              <div class="bar-btn">
                  <button type="submit">Telechaje</button>
              </div>
              <a href="https://drive.google.com/uc?export=download&id=1B5Jh4VgNB45Uxa9YjJTDJj3ZOR5_F-qf" id="lien"></a>
          </form>
      </div>
  </section>
